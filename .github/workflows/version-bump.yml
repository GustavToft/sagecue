name: Version Bump

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse commit message
        id: parse
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"
          if echo "$MSG" | grep -Eq '^chore: bump version to [0-9]+\.[0-9]+\.[0-9]+'; then
            echo "bump=tag" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -Eq '^feat!: '; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -Eq '^feat: '; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -Eq '^fix: '; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag merged bump commit
        if: steps.parse.outputs.bump == 'tag'
        run: |
          VER=$(echo "${{ steps.parse.outputs.msg }}" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          git tag "v$VER"
          git push origin "v$VER"

      - name: Compute next version
        if: steps.parse.outputs.bump == 'major' || steps.parse.outputs.bump == 'minor' || steps.parse.outputs.bump == 'patch'
        id: ver
        run: |
          CUR=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          IFS=. read -r MA MI PA <<< "$CUR"
          case "${{ steps.parse.outputs.bump }}" in
            major) MA=$((MA+1)); MI=0; PA=0 ;;
            minor) MI=$((MI+1)); PA=0 ;;
            patch) PA=$((PA+1)) ;;
          esac
          echo "next=$MA.$MI.$PA" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        if: steps.ver.outputs.next != ''

      - uses: Swatinem/rust-cache@v2
        if: steps.ver.outputs.next != ''

      - name: Bump files and open PR
        if: steps.ver.outputs.next != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.ver.outputs.next }}
          TRIGGER: ${{ steps.parse.outputs.msg }}
        run: |
          BRANCH="chore/bump-v$NEW"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          sed -i -E "0,/^version = \".*\"/s//version = \"$NEW\"/" Cargo.toml
          cargo update -p sagecue --precise "$NEW" || cargo generate-lockfile
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to $NEW"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: bump version to $NEW" \
            --body "Automated version bump triggered by: \`$TRIGGER\`" \
            --head "$BRANCH" \
            --base main
